name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Node lib (gateway-auth-node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: node/package-lock.json

      - name: Install
        run: npm ci

      - name: Test (vectors + express)
        run: npm test

      - name: Build (tsc)
        run: npm run build

  python:
    name: Python lib (gateway_auth)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: python/pyproject.toml

      - name: Install (with test + fastapi extras)
        run: pip install -e ".[test,fastapi]"

      - name: Test (vectors + fastapi middleware)
        run: pytest -v
